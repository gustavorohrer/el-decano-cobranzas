
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>El Decano - Gestión de Club</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#064e3b">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
          theme: {
            extend: {
              gridTemplateColumns: {
                '24': 'repeat(24, minmax(0, 1fr))',
              }
            }
          }
        }
    </script>
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #f8fafc;
        }
        
        /* Marca de agua del escudo en el fondo */
        .club-watermark {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-100%, -50%);
            width: 500px;
            height: 500px;
            background-image: url('https://i.ibb.co/VYjDq0m/escudo-club.png');
            background-repeat: no-repeat;
            background-position: center;
            background-size: contain;
            opacity: 0.04;
            pointer-events: none;
            z-index: 0;
            filter: grayscale(20%);
        }

        @media (min-width: 768px) {
            .club-watermark {
                transform: translate(0%, -50%);
                left: 40%;
            }
        }

        @media (max-width: 640px) {
            .mobile-safe-area { padding-bottom: env(safe-area-inset-bottom); }
            .club-watermark {
                width: 250px;
                height: 250px;
                transform: translate(-50%, -50%);
                left: 50%;
            }
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(0,0,0,0.1);
            border-radius: 10px;
        }
    </style>
<script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.4",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "react/": "https://esm.sh/react@^19.2.4/",
    "lucide-react": "https://esm.sh/lucide-react@^0.563.0",
    "recharts": "https://esm.sh/recharts@^3.7.0",
    "xlsx": "https://esm.sh/xlsx@0.18.5"
  }
}
</script>
</head>
<body class="bg-slate-50 text-slate-900">
    <div class="club-watermark"></div>
    <div id="root" class="relative z-10"></div>
</body>
</html>
